services:
  - type: web
    name: trinetra-ai-api
    env: python
    plan: starter
    runtime: python-3.11.0
    buildCommand: |
      python -m pip install --upgrade pip==23.3.1
      pip install --no-cache-dir -r requirements.txt
    startCommand: python deploy_api_minimal.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    healthCheckPath: /health
    
  - type: web  
    name: trinetra-ai-dashboard
    env: python
    plan: starter
    runtime: python-3.11.0
    buildCommand: |
      python -m pip install --upgrade pip==23.3.1
      pip install --no-cache-dir -r requirements.txt
    startCommand: streamlit run deploy_dashboard_minimal.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_BASE_URL
        value: https://trinetra-ai-api.onrender.com